<h1>Admin Login</h1>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method=""post action="/login">
    <label>
        Username:
        <input type="text" name="username">
    </label>
    <br><br>
    <label>
        Password:
        <input type="text" name="password">
    </label>
    <br><br>
    <button type="submit">Sign In</button>
</form>
</body>
</html>
